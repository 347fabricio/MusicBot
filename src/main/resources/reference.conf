# START OF JMUSICBOT CONFIG
# 
# Config for the JMusicBot                            
# Any line starting with // or # is ignored            
# You MUST set the token and owner
#
# All other items have defaults if you don't set them
#
# Open in Notepad++ / VS Code for best results

meta {
  # Used for config migration / forward compatibility.
  # DO NOT CHANGE THIS VALUE. It is managed automatically by the bot.
  configVersion = 2
}

discord {
  # This sets the token for the bot to log in with
  # This MUST be a bot token (user tokens will not work)
  # Guide: https://github.com/jagrosh/MusicBot/wiki/Getting-a-Bot-Token
  token = "BOT_TOKEN_HERE"

  # This sets the owner of the bot
  # This needs to be the owner's ID (a 17-18 digit number)
  # Guide: https://github.com/jagrosh/MusicBot/wiki/Finding-Your-User-ID
  owner = 0 # OWNER ID
}

playback {
  # Maximum track length in seconds.
  # 0 (or less) disables the limit.
  maxTrackSeconds = 0

  # Maximum number of YouTube playlist pages to load (100 tracks per page).
  # Example: 10 pages = up to 1000 tracks.
  maxYouTubePlaylistPages = 10

  # Maximum number of tracks to keep in playback history.
  # Used for: 
  # - the previous/rewind functionality.
  # - the history command and its subcommands.
  # 0 disables playback history entirely.
  maxHistorySize = 40

  # Ratio of users that must vote to skip the currently playing song.
  # Some guilds may override this, this is the default.
  skipRatio = 0.55

  youtube {
    # If true, uses YouTube OAuth device flow for playback.
    # Helpful for “Sign in to confirm you’re not a bot” / “Video unavailable” issues.
    # When enabled, a code is printed in console/DM'd to the owner for https://www.google.com/device
    # Only needs to be done once (refresh token persists unless changed).
    useOAuth = false
  }

  # Audio sources toggles.
  # If you want to disable a source, set the value to false
  audioSources {
    youtube = true
    soundcloud = true
    bandcamp = true
    vimeo = true
    twitch = true
    beam = true
    getyarn = true
    nico = true
    http = true
    local = true
  }

  # Transforms can rewrite play inputs into other inputs.
  # Advanced feature, can be used for whitelists/blacklists or custom routing.
  # Not easy to configure, see code for supported fields.
  transforms = {}
}

commands {
  # This sets the prefix for the bot
  # If you use !!, the play command will be !!play
  # If you do not set this, the prefix can be a mention of the bot (@Botname play)
  prefix = "@mention"

  # If you set this, the bot will also use this prefix in addition to the one above
  # "NONE" disables
  altPrefix = "NONE"

  # Word used to view the help
  help = "help"

  clearChannel {
    # Maximum number of messages to delete per clear operation.
    # 0 (or less) deletes all eligible messages.
    deleteLimit = 50

    # Maximum message age in days for clear operation eligibility.
    # 0 (or less) disables age filtering.
    ageDays = 14
  }

  # Configure custom aliases for commands.
  # Multiple aliases are comma-separated inside the list.
  # Example:
  # play = [ "p" ]
  # search = [ "yts", "find" ]
  aliases {
    # General commands
    settings = [ "status" ]

    # Music commands
    lyrics = []
    nowplaying = [ "np", "current" ]
    play = []
    playlists = [ "pls" ]
    queue = [ "list" ]
    remove = [ "delete" ]
    scsearch = []
    search = [ "ytsearch" ]
    shuffle = []
    skip = [ "voteskip" ]

    # Admin commands
    prefix = [ "setprefix" ]
    setdj = []
    setskip = [ "setskippercent", "skippercent", "setskipratio" ]
    settc = []
    setvc = []

    # DJ commands
    forceremove = [ "forcedelete", "modremove", "moddelete", "modelete" ]
    forceskip = [ "modskip" ]
    movetrack = [ "move" ]
    pause = []
    playnext = []
    queuetype = []
    repeat = []
    skipto = [ "jumpto" ]
    stop = [ "leave" ]
    volume = [ "vol" ]
  }
}

presence {
  # Modifies the default game shown on the bot.
  # Set to "NONE" for no game, "DEFAULT" for default behavior,
  # or set a custom string (Discord chooses the verb/presence style).
  game = "DEFAULT"

  # Default status: ONLINE | IDLE | DND | INVISIBLE
  status = "ONLINE"

  # If true, shows the currently playing song title in presence.
  # Works reliably only if the bot plays music in ONE guild.
  songInStatus = false
}

ui {
  # Customize emojis shown in bot responses.
  emojis {
    success = "🎶"
    warning = "💡"
    error = "🚫"
    loading = "⌚"
    searching = "🔎"
  }
}

gui {
  # If true, the GUI will be enabled.
  # Default is true.
  enabled = true
  
  # Theme for the GUI window: light, dark, darcula, intellij
  # Default is "dark" for a modern look
  theme = "dark"
  
  # Base font size for GUI components (8-24)
  # Higher values make text larger and more readable
  fontSize = 12
}

nowPlaying {
  # If true, the nowplaying command will show YouTube thumbnails.
  # Only works if minimalMessage is false
  images = false

  # If true, render now-playing messages in a compact/minimal layout.
  # If false, use the full now-playing layout.
  minimalMessage = false

  # If true, include interactive playback buttons in now-playing messages.
  # If false, render now-playing messages without action rows/buttons.
  showButtons = true

  # If true, show a progress bar in now-playing messages.
  # Also enables the 10-second now-playing refresh thread.
  showProgressBar = false
}

voice {
  # If true, the bot will not leave a voice channel after finishing a queue.
  # Staying connected uses additional bandwidth; not recommended if bandwidth is a concern.
  stayInChannel = false

  # Seconds the bot stays alone in a voice channel before leaving and clearing queue.
  # 0 (or less) disables.
  aloneTimeUntilStopSeconds = 10
}

paths {
  # Folder used for playlists (relative or absolute).
  playlistsFolder = "Playlists"
}

updates {
  # If true, the bot will DM the owner when a new version is available.
  alerts = true
}

logging {
  # Logging verbosity: off, error, warn, info, debug, trace, all
  # Recommended: info
  level = "info"
}

performance {
  # Audio buffer settings to reduce stuttering from GC pauses.
  # Higher values provide more protection but add latency.
  
  # NAS (Native Audio Send) buffer duration in milliseconds.
  # This buffer protects against JVM pauses up to this duration.
  # Default: 800 (can tolerate GC pauses up to 800ms)
  nasBufferMs = 800
  
  # Lavaplayer frame buffer duration in milliseconds.
  # Amount of decoded audio to keep buffered ahead of playback.
  # Default: 2000 (2 seconds of audio pre-buffered)
  frameBufferMs = 2000
}

proxy {
  # HTTP proxy configuration for routing traffic through a proxy server.
  # Leave host empty to disable proxy entirely.
  # This setting is EXPERIMENTAL/DEVELOPMENT level, may not work as expected
  # You can also provide proxy host/port using java args
  # -Dhttp.proxyHost=<proxy-hostname>
  # -Dhttp.proxyPort=<proxy-port>
  # -Dhttps.proxyHost=<proxy-hostname>
  # -Dhttps.proxyPort=<proxy-port>
  
  # Proxy server hostname (e.g., "127.0.0.1" or "proxy.example.com")
  host = ""
  
  # Proxy server port (e.g., 8080, 18080)
  port = 0
  
  # Which components should route through the proxy.
  # Practical use case: enable only lavaplayer to proxy audio streams
  # while letting Discord API and other traffic go through normally.
  
  # Route Lavaplayer audio source requests through proxy (YouTube, SoundCloud, etc.)
  lavaplayer = false
  
  # Route JDA Discord API traffic through proxy
  jda = false
  
  # Route GitHub version check requests through proxy
  github = false
}

dangerous {
  # Enables the eval command for the bot owner (arbitrary code execution).
  #
  # WARNING: Extremely dangerous. Only enable if you 100% understand the risks.
  # If someone asks you to enable this, there is a high chance they are scamming you.
  eval = false
  evalEngine = "Nashorn"
}

# END OF JMUSICBOT CONFIG
